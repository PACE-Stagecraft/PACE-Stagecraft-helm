name: Helm Lint & Template

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            echo "=== Linting $chart ==="
            helm lint "$chart" \
              --values "${chart}values.yaml" \
              --values "${chart}values.dev.yaml"
          done

      - name: Dry-run template (dev)
        run: |
          for chart in charts/*/; do
            name=$(basename $chart)
            echo "=== Templating $name (dev) ==="
            helm template "$name" "$chart" \
              --values "${chart}values.yaml" \
              --values "${chart}values.dev.yaml" \
              --set image.repository="123456789.dkr.ecr.us-east-1.amazonaws.com/${name}" \
              --set image.tag="v0.1.0" \
              > /dev/null
          done
