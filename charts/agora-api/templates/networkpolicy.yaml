apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agora-api.fullname" . }}-netpol
  namespace: agora
spec:
  podSelector:
    matchLabels:
      {{- include "agora-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: {{ .Values.service.port }}
    # agora-mcp-github's search_remediations tool calls
    # POST /internal/remediations/search directly, pod-to-pod (not through
    # the gateway) — without this, enabling real NetworkPolicy enforcement
    # (vpc-cni's enableNetworkPolicy) would silently block it.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agora-mcp-github
      ports:
        - port: {{ .Values.service.port }}
    # agora-frontend calls /api/v1/auth/me server-side (SSR) using the
    # internal cluster DNS (API_URL_INTERNAL) to verify the JWT cookie
    # before rendering the dashboard layout — must bypass the gateway.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agora-frontend
      ports:
        - port: {{ .Values.service.port }}
  egress:
    - {}
