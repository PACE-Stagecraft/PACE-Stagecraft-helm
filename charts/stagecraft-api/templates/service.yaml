apiVersion: v1
kind: Service
metadata:
  name: {{ include "stagecraft-api.fullname" . }}
  namespace: stagecraft
  labels:
    {{- include "stagecraft-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "stagecraft-api.selectorLabels" . | nindent 4 }}
