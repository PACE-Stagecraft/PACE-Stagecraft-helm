apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stagecraft-api.fullname" . }}-netpol
  namespace: stagecraft
spec:
  podSelector:
    matchLabels:
      {{- include "stagecraft-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: {{ .Values.service.port }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: stagecraft-mcp-github
      ports:
        - port: {{ .Values.service.port }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: stagecraft-frontend
      ports:
        - port: {{ .Values.service.port }}
  egress:
    - {}
