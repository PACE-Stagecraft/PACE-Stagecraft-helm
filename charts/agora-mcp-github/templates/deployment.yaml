apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agora-mcp-github.fullname" . }}
  namespace: agora
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agora-mcp-github.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agora-mcp-github.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: agora-mcp-github
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- if .Values.externalSecrets.secretsManagerPath }}
          envFrom:
            - secretRef:
                name: {{ include "agora-mcp-github.fullname" . }}-secrets
          {{- end }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
