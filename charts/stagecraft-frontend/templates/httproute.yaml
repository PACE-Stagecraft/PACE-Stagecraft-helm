{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "stagecraft-frontend.fullname" . }}
  namespace: stagecraft
spec:
  parentRefs:
    - name: stagecraft-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "stagecraft-frontend.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
