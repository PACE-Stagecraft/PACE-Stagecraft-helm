{{- if .Values.serviceAccount.create }}
# agora-frontend never calls the Kubernetes API — it only talks to agora-api
# and NextAuth/GitHub. This Role intentionally grants nothing (least
# privilege = the empty set), documented explicitly rather than left
# implicit by omission.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agora-frontend.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-frontend.labels" . | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agora-frontend.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-frontend.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: agora
roleRef:
  kind: Role
  name: {{ include "agora-frontend.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
