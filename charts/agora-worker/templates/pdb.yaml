{{- if gt (int .Values.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agora-worker.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-worker.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "agora-worker.selectorLabels" . | nindent 6 }}
{{- end }}
