{{- if .Values.serviceAccount.create }}
# agora-worker (Celery + the SQS consumer) never calls the Kubernetes API —
# it only talks to Redis, SQS, Postgres, Bedrock (cross-account) and GitHub.
# This Role intentionally grants nothing (least privilege = the empty set),
# documented explicitly rather than left implicit by omission.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agora-worker.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-worker.labels" . | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agora-worker.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-worker.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: agora
roleRef:
  kind: Role
  name: {{ include "agora-worker.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
