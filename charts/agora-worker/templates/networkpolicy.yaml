apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agora-worker.fullname" . }}-netpol
  namespace: agora
spec:
  podSelector:
    matchLabels:
      {{- include "agora-worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # agora-api calls POST /internal/investigate (the Investigator Agent's
    # entry point) on the health-server port — everything else stays denied.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agora-api
      ports:
        - protocol: TCP
          port: {{ .Values.healthPort }}
  egress:
    - {}
