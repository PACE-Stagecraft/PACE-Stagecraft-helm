apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stagecraft-worker.fullname" . }}-netpol
  namespace: stagecraft
spec:
  podSelector:
    matchLabels:
      {{- include "stagecraft-worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: stagecraft-api
      ports:
        - protocol: TCP
          port: {{ .Values.healthPort }}
  egress:
    - {}
