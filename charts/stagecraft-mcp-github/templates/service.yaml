apiVersion: v1
kind: Service
metadata:
  name: {{ include "stagecraft-mcp-github.fullname" . }}
  namespace: stagecraft
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "stagecraft-mcp-github.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
